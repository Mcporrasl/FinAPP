<!doctype html>
<html lang="en">
  <head>
    <script>
      // Polyfill setter for fetch on window to prevent TypeError in sandbox environments
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchValue || originalFetch;
            },
            set: function(val) {
              fetchValue = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch setter, ignoring:", e);
        }
      })();
    </script>
